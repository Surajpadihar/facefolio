name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend — lint + tests
    runs-on: ubuntu-latest

    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: facefolio
          POSTGRES_USER: facefolio
          POSTGRES_PASSWORD: facefolio
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U facefolio"
          --health-interval 5s --health-timeout 5s --health-retries 15

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: facefolio
      POSTGRES_USER: facefolio
      POSTGRES_PASSWORD: facefolio
      DJANGO_SECRET_KEY: ci-test-secret
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: testserver,localhost
      S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
      CELERY_BROKER_URL: redis://localhost:6379/0

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Run tests
        run: python -m pytest
